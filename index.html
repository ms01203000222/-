<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القراءات الميداني (Cloud Sync v3.1)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { cairo: ['Cairo', 'sans-serif'] }, colors: { primary: '#0ea5e9', secondary: '#1e293b', accent: '#f59e0b' } } }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input[type="file"] { display: none; }
        .custom-file-upload { border: 2px dashed #cbd5e1; display: inline-block; padding: 20px 40px; cursor: pointer; border-radius: 12px; transition: all 0.3s; }
        .custom-file-upload:hover { border-color: #0ea5e9; background: #f0f9ff; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #0ea5e9; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 pb-24">

    <header class="bg-secondary text-white p-4 sticky top-0 z-40 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-lg md:text-2xl font-bold flex items-center gap-2"><i class="fa-solid fa-bolt text-accent"></i> نظام القراءات <span class="bg-indigo-500 px-2 py-0.5 rounded text-[10px] text-white">Cloud v3.1</span></h1>
                <div id="cloud-status" class="text-[10px] text-slate-400 flex items-center gap-1 mt-1 font-bold">
                    <i class="fa-solid fa-circle text-gray-500"></i> جاري الاتصال بالسحابة...
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleCloudSettings()" class="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg text-sm"><i class="fa-solid fa-cloud"></i></button>
                <button onclick="clearSystemData()" class="bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg text-sm"><i class="fa-solid fa-trash-can"></i></button>
                <button onclick="exportData()" class="bg-primary hover:bg-sky-600 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> تصدير للشركة
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 mt-6 max-w-3xl">
        <div id="step-0" class="glass-panel rounded-2xl p-8 mb-8 slide-up">
            <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fa-solid fa-user-gear"></i></div>
            <h2 class="text-2xl font-bold mb-2 text-center">تعريف الهوية الميدانية</h2>
            <p class="text-slate-500 mb-6 text-center text-sm">أهلاً بك. يرجى إدخال اسمك لبدء تسجيل القراءات باسمك.</p>
            <div class="flex gap-2">
                <input type="text" id="user-name-input" placeholder="اكتب اسمك هنا" class="flex-grow bg-white rounded-xl px-4 py-3 border-2 border-slate-200 outline-none font-bold text-lg">
                <button onclick="saveUserInfo()" class="bg-primary text-white px-6 py-3 rounded-xl font-bold">دخول</button>
            </div>
        </div>

        <div id="step-1" class="hidden glass-panel rounded-2xl p-8 text-center slide-up mb-8 text-center">
            <label class="custom-file-upload w-full">
                <input type="file" id="excel-file" accept=".xlsx, .xls" />
                <div class="flex flex-col items-center gap-2 text-slate-500">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl"></i>
                    <span class="font-bold text-lg">رفع ملف الإكسيل الرئيسي</span>
                </div>
            </label>
        </div>

        <div id="step-2" class="hidden slide-up">
            <div class="grid grid-cols-3 lg:grid-cols-6 gap-2 mb-5">
                <div class="bg-white p-2 rounded-lg border text-center"><p class="text-[8px] font-bold">الإجمالي</p><h3 id="stat-real-total" class="font-black">0</h3></div>
                <div class="bg-indigo-50 p-2 rounded-lg border text-center"><p class="text-[8px] font-bold text-indigo-700">مستورد</p><h3 id="stat-imported" class="font-black text-indigo-700">0</h3></div>
                <div class="bg-amber-50 p-2 rounded-lg border text-center"><p class="text-[8px] font-bold text-amber-700">المطلوب</p><h3 id="stat-net-field" class="font-black text-amber-700">0</h3></div>
                <div class="bg-emerald-50 p-2 rounded-lg border text-center"><p class="text-[8px] font-bold text-emerald-700">المنجز</p><h3 id="stat-done" class="font-black text-emerald-700">0</h3></div>
                <div class="bg-sky-50 p-2 rounded-lg border text-center"><p class="text-[8px] font-bold text-sky-700">المتبقي</p><h3 id="stat-remain" class="font-black text-sky-700">0</h3></div>
                <div class="bg-purple-50 p-2 rounded-lg border text-center"><p class="text-[8px] font-bold text-purple-700">الاستهلاك</p><h3 id="stat-consumption" class="font-black text-purple-700">0</h3></div>
            </div>
            <input type="text" id="search" placeholder="بحث باسم المشترك أو العداد..." class="w-full bg-white rounded-xl px-4 py-3 mb-4 shadow border outline-none font-bold">
            <div id="subscribers-list" class="flex flex-col gap-3"></div>
            <div id="load-more-container" class="mt-6 text-center hidden"><button onclick="loadMoreItems()" class="bg-white border-2 border-primary text-primary px-8 py-2 rounded-full font-bold">المزيد ...</button></div>
        </div>
    </main>

    <div id="reading-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-5 w-full max-w-md shadow-2xl relative slide-up overflow-y-auto max-h-[95vh]">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-slate-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="text-xl font-bold mb-1" id="modal-name">المشترك</h3>
            <p class="text-xs text-slate-500 mb-4" id="modal-info"></p>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-sky-50 p-2 rounded-lg text-center"><p class="text-[10px] text-slate-500">السابقة</p><strong id="modal-prev-reading" class="text-primary text-xl">0</strong></div>
                <div class="bg-slate-50 p-2 rounded-lg text-center"><p class="text-[10px] text-slate-500">الخانات</p><strong id="modal-digits" class="text-slate-700 text-xl">-</strong></div>
            </div>
            <div class="mb-4">
                <div id="photo-btns" class="grid grid-cols-2 gap-2">
                    <div onclick="openCamera()" class="border-2 border-dashed border-sky-300 rounded-xl p-3 text-center cursor-pointer font-bold text-xs"><i class="fa-solid fa-camera mb-1 block"></i>كاميرا</div>
                    <div onclick="openGallery()" class="border-2 border-dashed border-slate-300 rounded-xl p-3 text-center cursor-pointer font-bold text-xs"><i class="fa-solid fa-image mb-1 block"></i>معرض</div>
                </div>
                <img id="photo-preview" class="hidden w-full h-40 object-cover rounded-xl mt-2 border">
                <p id="photo-status" class="text-center text-[10px] mt-1 font-bold text-slate-500"></p>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div><label class="block text-[10px] font-bold">الحالة</label><select id="status-input" class="w-full text-sm font-bold border p-2 rounded-lg outline-none"><option value="طبيعي">طبيعي</option><option value="مغلق">مغلق</option><option value="مصيف">مصيف</option><option value="معطل">معطل</option><option value="حالية أقل من السابقة">حالية أقل من السابقة</option></select></div>
                <div><label class="block text-[10px] font-bold">الحالية</label><input type="number" id="reading-input" class="w-full text-center text-xl font-black border p-1 rounded-lg outline-none" oninput="calculateLiveConsumption()"></div>
            </div>
            <div id="live-box" class="hidden mb-4 bg-emerald-50 p-2 rounded-lg text-center text-xs font-bold">الاستهلاك: <span id="live-val">0</span></div>
            <button onclick="saveReading()" class="w-full bg-primary text-white font-bold py-3 rounded-xl" id="save-btn">توثيق القراءة</button>
        </div>
    </div>

    <div id="cloud-modal" class="hidden fixed inset-0 bg-slate-900/50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl relative">
            <button onclick="toggleCloudSettings()" class="absolute top-4 left-4 text-slate-400"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="text-lg font-bold mb-4">إعدادات المزامنة</h3>
            <p class="text-xs mb-4">الموظف: <span id="emp-disp" class="font-bold text-primary"></span></p>
            <button onclick="document.getElementById('update-excel-file').click()" class="w-full bg-amber-500 text-white py-3 rounded-xl mb-2 font-bold italic">تحديث من إكسل واتساب</button>
            <input type="file" id="update-excel-file" accept=".xlsx, .xls" style="display:none" onchange="importUpdateExcel(event)">
            <button onclick="syncDataNow()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">مزامنة سحابية يدوية</button>
        </div>
    </div>

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 opacity-0 bg-slate-800 text-white px-6 py-2 rounded-full transition duration-300 z-[100] text-sm font-bold"></div>

    <script>
        let subscribers = [], imagesData = {}, currentUser = null, currentSubIndex = -1, currentFilteredList = [], displayLimit = 50;
        
        // --- بيانات قاعدة البيانات (تم تحديثها بالمفتاح الصحيح) ---
        const SB_URL = 'https://ebspeaxeloarfbfkbawn.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVic3BlYXhlbG9hcmZiZmtiYXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjYxNTYsImV4cCI6MjA5Mjg0MjE1Nn0.YvCx5Sy3HUIaqlgjvTppzoRq3M9VGldQHZejscphZ5k';
        // ---------------------------------------------------------

        let supabase = null;
        if (SB_URL && SB_KEY) supabase = window.supabase.createClient(SB_URL, SB_KEY);

        window.onload = async function() {
            currentUser = await localforage.getItem('appData_user');
            if (currentUser) {
                document.getElementById('step-0').classList.add('hidden');
                document.getElementById('emp-disp').innerText = currentUser;
                document.getElementById('step-1').classList.remove('hidden');
            }
            const saved = await localforage.getItem('appData_subscribers');
            const savedImgs = await localforage.getItem('appData_imagesData');
            if (saved && saved.length > 0) {
                subscribers = saved; imagesData = savedImgs || {};
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                currentFilteredList = subscribers; renderListChunk();
                checkCloud();
            }
        };

        async function checkCloud() {
            if (!supabase) return;
            try {
                const { error } = await supabase.from('field_readings').select('id').limit(1);
                const statusDiv = document.getElementById('cloud-status');
                if (!error) statusDiv.innerHTML = '<i class="fa-solid fa-cloud text-green-400"></i> متصل بالسحابة (مزامنة حية)';
                else statusDiv.innerHTML = '<i class="fa-solid fa-circle text-orange-400"></i> خطأ في الربط السحابي';
            } catch(e) {
                console.error("Cloud connection failed", e);
                document.getElementById('cloud-status').innerHTML = '<i class="fa-solid fa-circle text-orange-400"></i> بانتظار الاتصال (أوفلاين)';
             }
        }

        function saveUserInfo() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) return alert("الاسم مطلوب!");
            currentUser = name; localforage.setItem('appData_user', name);
            document.getElementById('emp-disp').innerText = name;
            document.getElementById('step-0').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg;
            t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        document.getElementById('excel-file').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                let hRow = 0;
                for (let r = 0; r < 10; r++) { if ((json[r]||[]).join('').includes('عداد')) { hRow = r; break; } }
                const heads = json[hRow] || [];
                const nI = heads.findIndex(h => h && String(h).match(/اسم|إسم/));
                const mI = heads.findIndex(h => h && String(h).includes('عداد') && !String(h).includes('خانات'));
                const pI = heads.findIndex(h => h && String(h).includes('قراء') && !String(h).includes('تاريخ'));
                const eI = heads.findIndex(h => h && String(h).includes('هندس'));
                const zI = heads.findIndex(h => h && String(h).includes('منطق'));
                const dI = heads.findIndex(h => h && String(h).includes('يومي'));
                const aI = heads.findIndex(h => h && String(h).includes('حساب'));

                subscribers = [];
                for (let i = hRow + 1; i < json.length; i++) {
                    if (json[i].length > 0) {
                        subscribers.push({
                            id: i, name: json[i][nI] || 'مجهول', meterNumber: json[i][mI] || '0',
                            eng: json[i][eI] || '0', zone: json[i][zI] || '0', daily: json[i][dI] || '0', acc: json[i][aI] || '0',
                            accountNumber: `${json[i][eI]}/${json[i][zI]}/${json[i][dI]}/${json[i][aI]}`,
                            prevReading: json[i][pI] || '0', reading: '', status: 'طبيعي', consumption: 0, imageSaved: false
                        });
                    }
                }
                localforage.setItem('appData_subscribers', subscribers);
                location.reload();
            };
            reader.readAsArrayBuffer(file);
        });

        function renderListChunk() {
            const list = document.getElementById('subscribers-list');
            const imp = subscribers.filter(s => s.isImportedUpdate).length;
            const done = subscribers.filter(s => s.imageSaved && !s.isImportedUpdate).length;
            const cons = subscribers.reduce((a, b) => a + (b.imageSaved && !b.isImportedUpdate ? parseFloat(b.consumption)||0 : 0), 0);
            
            document.getElementById('stat-real-total').innerText = subscribers.length;
            document.getElementById('stat-imported').innerText = imp;
            document.getElementById('stat-net-field').innerText = subscribers.length - imp;
            document.getElementById('stat-done').innerText = done;
            document.getElementById('stat-remain').innerText = subscribers.length - done - imp;
            document.getElementById('stat-consumption').innerText = Math.round(cons);

            const toShow = currentFilteredList.slice(0, displayLimit);
            list.innerHTML = toShow.map(sub => {
                const isFin = sub.imageSaved || sub.isImportedUpdate;
                return `
                    <div class="glass-panel p-3 rounded-xl border-r-4 ${sub.isImportedUpdate ? 'border-r-red-400 bg-red-50/10' : (isFin ? 'border-r-emerald-400 bg-emerald-50/10' : 'border-r-slate-200')}" onclick="openModal(${sub.id})">
                        <h4 class="font-bold text-xs">${sub.name}</h4>
                        <div class="flex justify-between text-[10px] mt-1 text-slate-500">
                            <span>عداد: ${sub.meterNumber} | حساب: ${sub.accountNumber}</span>
                            ${isFin ? `<span class="font-black text-slate-800">ق: ${sub.reading}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateLiveConsumption() {
            const cur = parseFloat(document.getElementById('reading-input').value);
            const pre = parseFloat(subscribers[currentSubIndex].prevReading);
            const box = document.getElementById('live-box');
            if (isNaN(cur)) return box.classList.add('hidden');
            box.classList.remove('hidden');
            document.getElementById('live-val').innerText = cur < pre ? "شاذة" : Math.round(cur - pre);
        }

        function openModal(id) {
            currentSubIndex = subscribers.findIndex(s => s.id === id); const s = subscribers[currentSubIndex];
            document.getElementById('modal-name').innerText = s.name;
            document.getElementById('modal-info').innerText = `عداد: ${s.meterNumber} | حساب: ${s.accountNumber}`;
            document.getElementById('modal-prev-reading').innerText = s.prevReading;
            document.getElementById('reading-input').value = s.reading;
            document.getElementById('status-input').value = s.status || 'طبيعي';
            
            const isImp = !!s.isImportedUpdate;
            document.getElementById('reading-input').disabled = isImp;
            document.getElementById('status-input').disabled = isImp;
            document.getElementById('save-btn').disabled = isImp;
            document.getElementById('save-btn').innerText = isImp ? "قراءة مستوردة" : "توثيق القراءة";
            
            const prev = document.getElementById('photo-preview');
            if (imagesData[s.meterNumber]) { prev.src = imagesData[s.meterNumber]; prev.classList.remove('hidden'); }
            else prev.classList.add('hidden');
            
            calculateLiveConsumption();
            document.getElementById('reading-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('reading-modal').classList.add('hidden'); }
        function toggleCloudSettings() { document.getElementById('cloud-modal').classList.toggle('hidden'); }

        const nativeCam = document.createElement('input'); nativeCam.type = 'file'; nativeCam.accept = 'image/*'; nativeCam.capture = 'environment';
        const nativeGal = document.createElement('input'); nativeGal.type = 'file'; nativeGal.accept = 'image/*';
        let photoSource = '';
        function openCamera() { photoSource = 'camera'; nativeCam.click(); }
        function openGallery() { photoSource = 'gallery'; nativeGal.click(); }

        [nativeCam, nativeGal].forEach(input => input.addEventListener('change', function(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (env) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const scale = 1000 / Math.max(img.width, img.height);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const data = canvas.toDataURL('image/jpeg', 0.6);
                    imagesData[subscribers[currentSubIndex].meterNumber] = data;
                    subscribers[currentSubIndex].imageSaved = true;
                    document.getElementById('photo-preview').src = data;
                    document.getElementById('photo-preview').classList.remove('hidden');
                }; img.src = env.target.result;
            }; r.readAsDataURL(f);
        }));

        async function saveReading() {
            const s = subscribers[currentSubIndex]; const val = document.getElementById('reading-input').value;
            if (!s.imageSaved) return alert("الصورة مطلوبة!");
            if (photoSource === 'camera') {
                const pos = await new Promise(res => navigator.geolocation.getCurrentPosition(res, () => res(null), {timeout: 10000}));
                if (!pos) return alert("الموقع مطلوب مع الكاميرا!");
                s.lat = pos.coords.latitude; s.lng = pos.coords.longitude;
            } else { s.lat = 'معرض'; s.lng = 'معرض'; }
            
            s.reading = val; s.status = document.getElementById('status-input').value;
            s.consumption = parseFloat(val) - parseFloat(s.prevReading);
            s.date = new Date().toLocaleString('ar-EG'); s.recorder = currentUser;

            await localforage.setItem('appData_subscribers', subscribers);
            await localforage.setItem('appData_imagesData', imagesData);
            closeModal(); renderListChunk(); showToast("تم الحفظ محلياً...");
            
            if (supabase) {
                const { error } = await supabase.from('field_readings').upsert({
                    sync_id: s.meterNumber + "_" + Date.now(),
                    recorder_name: currentUser, meter_number: s.meterNumber, account_number: s.accountNumber,
                    reading_value: s.reading, status: s.status, consumption: s.consumption,
                    latitude: s.lat, longitude: s.lng
                });
                if (!error) showToast("تم الرفع للسحابة ✅");
                else console.error("Sync error:", error);
            }
        }

        function importUpdateExcel(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (evt) => {
                const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                const heads = json[0] || [];
                const eI = heads.findIndex(h => h && String(h).includes('هندس'));
                const zI = heads.findIndex(h => h && String(h).includes('منطق'));
                const dI = heads.findIndex(h => h && String(h).includes('يومي'));
                const aI = heads.findIndex(h => h && String(h).includes('حساب'));
                const mI = heads.findIndex(h => h && String(h).includes('عداد'));
                const rI = heads.findIndex(h => h && (String(h).includes('حالية') || String(h).includes('قراءة')));
                
                let count = 0;
                for (let i = 1; i < json.length; i++) {
                    const row = json[i];
                    const match = subscribers.find(s => String(s.eng)==String(row[eI]||'') && String(s.zone)==String(row[zI]||'') && String(s.daily)==String(row[dI]||'') && String(s.acc)==String(row[aI]||'') && String(s.meterNumber)==String(row[mI]||''));
                    if (match && row[rI]) {
                        match.reading = row[rI]; match.isImportedUpdate = true;
                        match.consumption = parseFloat(row[rI]) - parseFloat(match.prevReading);
                        match.imageSaved = true; count++;
                    }
                }
                localforage.setItem('appData_subscribers', subscribers); renderListChunk(); showToast(`تم تحديث ${count} سجل بنجاح.`);
            }; r.readAsArrayBuffer(f);
        }

        async function exportData() {
            const field = subscribers.filter(s => s.imageSaved && !s.isImportedUpdate);
            if (field.length === 0) return alert("لا يوجد عمل ميداني!");
            const zip = new JSZip();
            const ws_data = [['هندسة','منطقة','يومية','حساب','الاسم','العداد','الحالة','القراءة','الاستهلاك','المسجل','التاريخ','GPS']];
            field.forEach(s => ws_data.push([s.eng, s.zone, s.daily, s.acc, s.name, s.meterNumber, s.status, s.reading, s.consumption, s.recorder, s.date, `https://www.google.com/maps?q=${s.lat},${s.lng}`]));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), "التقرير");
            zip.file("Report.xlsx", XLSX.write(wb, { type: 'array', bookType: 'xlsx' }));
            const img = zip.folder("Images");
            for (const [m, d] of Object.entries(imagesData)) { if(subscribers.find(x => x.meterNumber == m && !x.isImportedUpdate)) img.file(`meter_${m}.jpg`, d.split(',')[1], {base64:true}); }
            zip.generateAsync({type:"blob"}).then(c => saveAs(c, `Export_${currentUser}.zip`));
        }

        async function syncDataNow() { 
            showToast("جاري المزامنة..."); 
            checkCloud(); 
        }
        
        function clearSystemData() { if(confirm("حذف كل البيانات سيعيد التطبيق كأنه جديد. هل أنت متأكد؟")) { localforage.clear(); location.reload(); } }
    </script>
</body>
